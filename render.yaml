services:
  - type: web
    name: fraud-api
    env: python
    region: oregon
    plan: free
    buildCommand: pip install -r api/requirements.txt
    startCommand: cd api && uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: MODEL_PATH
        value: ../model/artifacts/model.pkl
      - key: DATABASE_URL
        sync: false   # paste Neon connection string in Render dashboard
      - key: REDIS_URL
        sync: false   # paste Upstash Redis URL in Render dashboard
